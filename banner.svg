<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#grad1)" rx="10" />
  
  <!-- Shield Icon -->
  <path d="M400 40 L460 65 V110 C460 145 400 170 400 170 C400 170 340 145 340 110 V65 L400 40 Z" fill="none" stroke="#38bdf8" stroke-width="4" filter="url(#glow)" />
  <text x="400" y="115" font-family="Arial, sans-serif" font-size="24" fill="#38bdf8" text-anchor="middle" font-weight="bold" filter="url(#glow)">AI</text>
  
  <!-- Text Elements -->
  <text x="400" y="40" font-family="Verdana, sans-serif" font-size="32" fill="#f8fafc" text-anchor="middle" font-weight="bold">Awesome LLM Firewalls</text>
  <text x="400" y="190" font-family="Verdana, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Secure • Reliable • Compliant</text>
  
  <!-- Circuit Lines Decor -->
  <path d="M50 100 H150 M150 100 L180 70 M150 100 L180 130" stroke="#1e40af" stroke-width="2" opacity="0.5" />
  <path d="M750 100 H650 M650 100 L620 70 M650 100 L620 130" stroke="#1e40af" stroke-width="2" opacity="0.5" />
</svg>
